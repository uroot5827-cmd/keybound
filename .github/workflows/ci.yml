name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    ci:
        name: 类型检查 / 代码检查 / 测试
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22.13.0'

            - uses: pnpm/action-setup@v4
              with:
                  version: 9.14.4

            - name: 安装依赖
              run: pnpm install

            - name: 类型检查
              run: pnpm check:types

            - name: 代码格式检查
              run: pnpm check:format

            - name: ESLint 检查
              run: pnpm check:lint

            - name: 运行测试
              run: pnpm test:run --coverage

            - name: 依赖分析
              run: pnpm check:deps

            - name: 上传覆盖率报告
              uses: actions/upload-artifact@v4
              with:
                  name: coverage
                  path: coverage/
                  retention-days: 7
